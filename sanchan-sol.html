#loading{position:fixed;inset:0;z-index:80;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:var(--sol-dark)}

.load-text{font-size:0.75rem;letter-spacing:3px;color:rgba(255,255,255,0.3);text-transform:uppercase}
</style>
</head>

  document.getElementById('load-txt').textContent=lang==='ja'?'SOL価格を取得中…':'Fetching SOL price...';
  const p=await fetchPrice();
  if(!p){solPrice=145.23+(Math.random()-0.5)*10;document.getElementById('load-txt').textContent=lang==='ja'?'オフライン：デモ価格使用':'Offline: using demo price';await new Promise(r=>setTimeout(r,1000));}else{solPrice=p;}
  priceHistory=[solPrice];updatePriceDisplay();drawChart();hidePage('loading');showTitle();
}
async function connectPhantom(){
  const ph=window.solana;
  if(!ph?.isPhantom){alert(lang==='ja'?'Phantomがインストールされていません。':'Phantom is not installed.');return;}
  try{
    document.getElementById('phantom-btn-txt').textContent=lang==='ja'?'接続中…':'Connecting...';
    const resp=await ph.connect();walletAddr=resp.publicKey.toString();
    try{const rpcResp=await fetch('https://api.mainnet-beta.solana.com',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({jsonrpc:'2.0',id:1,method:'getBalance',params:[walletAddr]})});const rpc=await rpcResp.json();walletBal=(rpc.result?.value??0)/1e9;}catch{walletBal=null;}
    startWithWallet();
  }catch(e){document.getElementById('phantom-btn-txt').textContent=lang==='ja'?'Phantomウォレットで接続':'Connect Phantom Wallet';if(e.code!==4001)console.error(e);}
}
function startWithWallet(){
  hidePage('sc-title');showGameUI();
  if(walletAddr){const strip=document.getElementById('wallet-strip');strip.classList.add('show');document.getElementById('ws-addr').textContent=walletAddr.slice(0,6)+'…'+walletAddr.slice(-4);document.getElementById('ws-bal').textContent=walletBal!=null?walletBal.toFixed(4)+' SOL':'? SOL';}
  startGame();
}
function startWithoutWallet(){hidePage('sc-title');showGameUI();startGame();}
function startGame(){round=1;score=0;streak=0;simSol=0.10;ghostLv=3;prediction=null;waiting=false;updateGhost();updateHUD();enableButtons();startCountdown();priceLoop();}
function startCountdown(){
  secToNext=30;updateCountdown();
  if(interval)clearInterval(interval);
  interval=setInterval(()=>{secToNext--;updateCountdown();if(secToNext<=0){secToNext=30;if(prediction&&!waiting)onTimeUp();}},1000);
}
function updateCountdown(){
  document.getElementById('cd-num').textContent=secToNext;
  const pct=secToNext/30,circ=138.23;
  document.getElementById('cd-fill').style.strokeDashoffset=circ*(1-pct);
  const col=secToNext>15?'var(--sol-purple)':secToNext>8?'#ffcc00':'#ff4444';
  document.getElementById('cd-fill').style.stroke=col;
}
async function priceLoop(){
  if(priceLoopTimer)clearTimeout(priceLoopTimer);
  const newPrice=await fetchPrice();
  if(newPrice){prevPrice=solPrice;solPrice=newPrice;priceHistory.push(solPrice);if(priceHistory.length>30)priceHistory.shift();updatePriceDisplay();drawChart();if(waiting&&prediction)resolveRound();}
  priceLoopTimer=setTimeout(priceLoop,30000);
}
function onTimeUp(){if(!prediction)return;waiting=true;fetchPrice().then(p=>{if(p){prevPrice=solPrice;solPrice=p;priceHistory.push(p);if(priceHistory.length>30)priceHistory.shift();updatePriceDisplay();drawChart();}resolveRound();});}
function resolveRound(){waiting=false;if(!prediction||!predPrice){nextRound();return;}const win=(prediction==='up'&&solPrice>predPrice)||(prediction==='down'&&solPrice<predPrice);prediction=null;predPrice=null;enableButtons();if(win)onWin();else onLoss();}
function onWin(){streak++;const mult=streakMult(),pts=Math.round(100*mult),solGain=+(0.01*mult).toFixed(4);score+=pts;simSol=+(simSol+solGain).toFixed(4);ghostLv=Math.max(0,ghostLv-1);updateGhost();updateHUD();spawnPts(`+${pts} (×${mult})`,'#14F195');showResultBanner(true);flashScreen('rgba(20,241,149,0.2)');spawnPars(window.innerWidth/2,window.innerHeight/2,['✨','🚀','💫','⭐','🌟'],14);popGhost();setTimeout(()=>hideResultBanner(),1600);round++;document.getElementById('ss-round').textContent=round;}
function onLoss(){streak=0;score=Math.max(0,score-20);simSol=Math.max(0,+(simSol-0.005).toFixed(4));ghostLv=Math.min(6,ghostLv+1);updateGhost();updateHUD();spawnPts('-0.005 SOL','#ff5555');showResultBanner(false);flashScreen('rgba(255,50,30,0.2)');spawnPars(window.innerWidth/2,window.innerHeight/2,['💀','😈','🔥','💔','⚡'],10);popGhost();setTimeout(()=>hideResultBanner(),1600);round++;document.getElementById('ss-round').textContent=round;}
function nextRound(){round++;document.getElementById('ss-round').textContent=round;}
function streakMult(){if(streak>=10)return 5;if(streak>=6)return 3;if(streak>=3)return 2;if(streak>=2)return 1.5;return 1;}
function predict(dir){if(prediction||waiting||!solPrice)return;prediction=dir;predPrice=solPrice;disableButtons();const j=lang==='ja';document.getElementById('status-txt').textContent=j?`${dir==='up'?'🚀 上昇':'📉 下落'}を予測！30秒後の価格を確認…`:`Predicted ${dir==='up'?'🚀 UP':'📉 DOWN'}! Checking price in 30s…`;document.getElementById('btn-'+dir).style.opacity='1';document.getElementById('btn-'+dir).style.boxShadow=dir==='up'?'0 0 30px rgba(20,241,149,0.6)':'0 0 30px rgba(255,80,80,0.6)';}
function disableButtons(){document.getElementById('btn-up').disabled=true;document.getElementById('btn-down').disabled=true;}
function enableButtons(){['btn-up','btn-down'].forEach(id=>{const b=document.getElementById(id);b.disabled=false;b.style.opacity='';b.style.boxShadow='';});const j=lang==='ja';document.getElementById('status-txt').textContent=j?'上がる・下がるを予測してタップ！':'Tap to predict UP or DOWN!';}
function updatePriceDisplay(){if(!solPrice)return;const el=document.getElementById('price-num');el.textContent='$'+solPrice.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});const dir=prevPrice?(solPrice>prevPrice?'up':solPrice<prevPrice?'down':'neutral'):'neutral';el.className=dir;const chg=document.getElementById('price-change');if(prevPrice){const diff=solPrice-prevPrice,pct=(diff/prevPrice*100).toFixed(3);chg.textContent=(diff>=0?'▲ +':'▼ ')+Math.abs(diff).toFixed(2)+' ('+pct+'%)';chg.className=diff>=0?'up':'down';}else{chg.textContent='';}}
function drawChart(){const canvas=document.getElementById('chart-canvas'),wrap=document.getElementById('chart-wrap'),dpr=window.devicePixelRatio||1;canvas.width=wrap.clientWidth*dpr;canvas.height=wrap.clientHeight*dpr;canvas.style.width=wrap.clientWidth+'px';canvas.style.height=wrap.clientHeight+'px';const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);const W=wrap.clientWidth,H=wrap.clientHeight,data=priceHistory;if(data.length<2)return;const min=Math.min(...data)*0.9995,max=Math.max(...data)*1.0005,toY=v=>H-(v-min)/(max-min)*(H-8)-4,toX=(i,n)=>i/(n-1)*(W-4)+2;const grad=ctx.createLinearGradient(0,0,0,H),isUp=data[data.length-1]>=data[0];grad.addColorStop(0,isUp?'rgba(20,241,149,0.25)':'rgba(255,80,80,0.22)');grad.addColorStop(1,'rgba(0,0,0,0)');ctx.beginPath();ctx.moveTo(toX(0,data.length),H);data.forEach((v,i)=>ctx.lineTo(toX(i,data.length),toY(v)));ctx.lineTo(toX(data.length-1,data.length),H);ctx.closePath();ctx.fillStyle=grad;ctx.fill();ctx.beginPath();data.forEach((v,i)=>{if(i===0)ctx.moveTo(toX(0,data.length),toY(v));else ctx.lineTo(toX(i,data.length),toY(v));});ctx.strokeStyle=isUp?'#14F195':'#ff5555';ctx.lineWidth=2;ctx.lineJoin='round';ctx.shadowBlur=8;ctx.shadowColor=isUp?'rgba(20,241,149,0.6)':'rgba(255,80,80,0.6)';ctx.stroke();ctx.shadowBlur=0;if(prediction&&predPrice){const predY=toY(predPrice);ctx.strokeStyle='rgba(255,220,0,0.6)';ctx.lineWidth=1;ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(0,predY);ctx.lineTo(W,predY);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='#ffd700';ctx.font='bold 9px sans-serif';ctx.textAlign='right';ctx.fillText('$'+predPrice.toFixed(2),W-4,predY-3);ctx.textAlign='left';}}
function updateGhost(){const g=GS[Math.min(ghostLv,GS.length-1)];document.getElementById('gs1').setAttribute('stop-color',g.body1);document.getElementById('gs2').setAttribute('stop-color',g.body2);document.getElementById('gel').setAttribute('fill',g.eyes);document.getElementById('ger').setAttribute('fill',g.eyes);document.getElementById('gextra').innerHTML=g.extra;document.getElementById('ghost-aura-el').style.background=g.aura;document.getElementById('ghost-svg-el').style.filter=`drop-shadow(${g.glow})`;document.getElementById('ghost-acc-el').textContent=g.acc;document.getElementById('tg-emoji').textContent=g.emoji;}
function popGhost(){const gc=document.getElementById('ghost-container');gc.classList.remove('ghost-pop');void gc.offsetWidth;gc.classList.add('ghost-pop');gc.addEventListener('animationend',()=>gc.classList.remove('ghost-pop'),{once:true});}
function showResultBanner(win){const j=lang==='ja',b=document.getElementById('result-banner');document.getElementById('rb-emoji').textContent=win?'🎉':'💀';document.getElementById('rb-text').textContent=win?(j?'予言的中！🚀':'CORRECT! 🚀'):(j?'外れた…😈':'WRONG... 😈');document.getElementById('rb-text').style.color=win?'#14F195':'#ff5555';b.classList.add('show');}
function hideResultBanner(){document.getElementById('result-banner').classList.remove('show');}
function updateHUD(){document.getElementById('ss-score').textContent=score.toLocaleString();document.getElementById('ss-sol').textContent=simSol.toFixed(3);const sb=document.getElementById('streak-badge');if(streak>=2){sb.classList.remove('off');document.getElementById('streak-num').textContent=streak;const mult=streakMult();sb.style.borderColor=mult>=3?'#ffd700':'rgba(20,241,149,0.3)';sb.style.background=mult>=3?'rgba(255,210,0,0.15)':'rgba(20,241,149,0.12)';sb.style.color=mult>=3?'#ffd700':'var(--sol-green)';}else{sb.classList.add('off');}}
function spawnPars(cx,cy,emojis,n){for(let i=0;i<n;i++){const p=document.createElement('div');p.className='par';const angle=(Math.PI*2*i/n)+Math.random()*0.8,d=70+Math.random()*140,t=0.6+Math.random()*0.6;p.textContent=emojis[~~(Math.random()*emojis.length)];p.style.cssText=`left:${cx}px;top:${cy}px;transform:translate(-50%,-50%);--x:${Math.cos(angle)*d}px;--y:${Math.sin(angle)*d-50}px;--t:${t}s;--r:${(Math.random()-.5)*600}deg;--s:${0.8+Math.random()*0.8}rem;animation-delay:${Math.random()*0.1}s`;document.body.appendChild(p);setTimeout(()=>p.remove(),(t+0.15)*1000);}}
function spawnPts(text,color){const el=document.createElement('div');el.className='pts-pop';el.textContent=text;el.style.cssText=`left:50%;top:45%;transform:translateX(-50%);color:${color};text-shadow:0 0 12px ${color}`;document.body.appendChild(el);setTimeout(()=>el.remove(),950);}
function flashScreen(bg){const f=document.getElementById('flash');f.style.background=bg;f.classList.add('a');setTimeout(()=>{f.classList.remove('a');f.classList.add('f');setTimeout(()=>f.classList.remove('f'),600);},120);}
function hidePage(id){document.getElementById(id).style.display='none';}
function showTitle(){document.getElementById('sc-title').classList.remove('off');}
function showGameUI(){document.getElementById('game-ui').style.display='flex';}
function setLang(l){lang=l;document.getElementById('lj').classList.toggle('on',l==='ja');document.getElementById('le').classList.toggle('on',l==='en');const j=l==='ja';document.getElementById('t-logo').innerHTML=j?'さんちゃん<br>SOL予言師':'Sanchan<br>SOL Oracle';document.getElementById('t-card').innerHTML=j?'リアルタイムの<b>SOL価格</b>を使ったゲーム。<br>30秒後に価格が<em>上がる</em>か<em>下がる</em>かを予測！<br>予測が当たるとゴーストが<em>天使に進化</em>し、<br>外れると<em>悪魔</em>になる…':'A game using <b>live SOL price</b>.<br>Predict if SOL goes <em>UP</em> or <em>DOWN</em> in 30s!<br>Correct = ghost <em>evolves toward angel</em>,<br>Wrong = becomes a <em>demon</em>…';document.getElementById('phantom-btn-txt').textContent=j?'Phantomウォレットで接続':'Connect Phantom Wallet';document.getElementById('skip-txt').textContent=j?'ウォレットなしでプレイ':'Play without wallet';document.getElementById('up-txt').textContent='UP!';document.getElementById('dn-txt').textContent='DOWN!';document.getElementById('up-sub').textContent=j?'上がる':'Goes up';document.getElementById('dn-sub').textContent=j?'下がる':'Goes down';document.getElementById('ssl-score').textContent='SCORE';document.getElementById('ssl-round').textContent=j?'ラウンド':'ROUND';document.getElementById('cd-label').textContent=j?'次の更新まで':'Next update';document.getElementById('streak-suffix').textContent=j?'連続':'streak';document.getElementById('status-txt').textContent=j?'上がる・下がるを予測してタップ！':'Tap to predict UP or DOWN!';document.getElementById('load-txt').textContent=j?'SOL価格を取得中…':'Fetching SOL price...';}
window.addEventListener('resize',drawChart);
setLang('ja');
initPrice();
</script>
