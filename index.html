<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="港クエスト">
<meta name="theme-color" content="#0a0010">
<link rel="manifest" href="manifest.json">
<title>港クエスト 🌊</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#0a0010;font-size:clamp(15px,4.2vw,18px);
  font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP','Meiryo',sans-serif;color:#fff}
#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;
  position:relative;background:#0a0010}

/* HUD */
#hud{flex-shrink:0;background:rgba(0,0,0,0.9);border-bottom:2px solid #ff69b4;
  padding:5px 8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.hb{font-size:0.8em;text-align:center;flex:1}
.hv{font-weight:bold;font-size:1.05em}
.hm{color:#ffd700;font-weight:bold}
#lang-btn{background:rgba(255,105,180,0.3);border:1px solid #ff69b4;color:#fff;
  padding:4px 8px;border-radius:6px;cursor:pointer;font-size:0.78em;flex-shrink:0}

/* Canvas */
#gc{flex:1;display:block;width:100%;touch-action:none}

/* Message bar */
#msg{flex-shrink:0;background:rgba(0,0,0,0.85);border-top:1px solid #444;
  border-bottom:1px solid #444;padding:6px 12px;font-size:0.9em;color:#eee;min-height:30px}

/* Controls */
#ctrl{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:6px 12px;background:rgba(0,0,0,0.5)}
.dp{display:grid;grid-template-columns:56px 56px 56px;grid-template-rows:56px 56px 56px;gap:4px}
.db{background:rgba(255,105,180,0.2);border:2px solid rgba(255,105,180,0.5);
  border-radius:10px;color:#fff;font-size:1.6em;display:flex;align-items:center;
  justify-content:center;cursor:pointer;user-select:none;-webkit-user-select:none;
  touch-action:none}
.db:active,.db.on{background:rgba(255,105,180,0.55);border-color:#ff69b4}
#abtn{padding:12px 18px;background:linear-gradient(135deg,#ff69b4,#daa520);
  border:none;border-radius:14px;color:#fff;font-size:1em;font-weight:bold;
  cursor:pointer;display:none;touch-action:manipulation;white-space:nowrap}

/* Battle overlay */
#bov{display:none;position:absolute;inset:0;background:rgba(0,0,12,0.97);
  z-index:50;flex-direction:column;align-items:center;overflow-y:auto;padding:8px;
  -webkit-overflow-scrolling:touch}
.bh{text-align:center;padding:6px;color:#cc88ff;font-size:1.1em;font-weight:bold}
.bcard{background:rgba(136,68,255,0.12);border:2px solid #8844ff;border-radius:14px;
  padding:12px;text-align:center;width:100%;max-width:400px;margin-bottom:7px}
.bci{font-size:2.8em}
.bcn{color:#cc88ff;font-weight:bold;font-size:1.05em;margin:3px 0}
.bcs{font-size:0.82em;color:#aaa}
.bbar{margin-top:7px}
.blabel{font-size:0.82em;color:#ff8888;font-weight:bold;margin-bottom:3px}
.bbg{background:#333;border-radius:5px;height:16px;overflow:hidden}
.bfill{background:linear-gradient(90deg,#ff4444,#ff8800);height:100%;border-radius:5px;transition:width 0.4s}
.bval{font-size:0.95em;color:#ff8888;font-weight:bold;margin-top:3px}
.mpbar{background:rgba(68,136,255,0.1);border:1px solid #4488ff;border-radius:9px;
  padding:6px 10px;width:100%;max-width:400px;margin-bottom:5px}
.mpbg{background:#333;border-radius:4px;height:10px;margin-top:3px;overflow:hidden}
.mpfill{background:linear-gradient(90deg,#4488ff,#88ccff);height:100%;border-radius:4px;transition:width 0.3s}
.blog{background:rgba(0,0,0,0.5);border:1px solid #444;border-radius:9px;
  padding:7px 9px;width:100%;max-width:400px;height:100px;overflow-y:auto;
  margin-bottom:5px;font-size:0.84em;-webkit-overflow-scrolling:touch}
.bl{padding:3px 0;color:#ddd}.bl.g{color:#88ff88}.bl.b{color:#ff8888}.bl.o{color:#cc88ff;font-style:italic}
.bpay{text-align:center;font-size:0.9em;color:#daa520;padding:3px}
.brnd{text-align:center;font-size:0.82em;color:#aaa;margin-bottom:5px}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;width:100%;max-width:400px;padding-bottom:8px}
.sk{background:rgba(136,68,255,0.18);border:2px solid #8844ff;border-radius:12px;
  padding:12px 8px;cursor:pointer;text-align:center;color:#fff;touch-action:manipulation}
.sk:active:not(:disabled){background:rgba(136,68,255,0.5);transform:scale(0.97)}
.sk:disabled{opacity:0.25;cursor:not-allowed}
.sn{font-size:1.05em;font-weight:bold}
.sm{font-size:0.84em;color:#aaccff;margin-top:4px}

/* Start/End screens */
.oscreen{display:none;position:absolute;inset:0;background:linear-gradient(135deg,#08001a,#18002e);
  z-index:100;flex-direction:column;align-items:center;justify-content:center;padding:16px;
  overflow-y:auto;-webkit-overflow-scrolling:touch}
.logo{font-size:3em;text-align:center;text-shadow:0 0 20px #ff69b4;margin-bottom:4px}
.sublogo{color:#daa520;font-size:0.95em;margin-bottom:16px;text-align:center}
.card{background:rgba(255,255,255,0.07);border:2px solid #ff69b4;border-radius:16px;
  padding:20px;width:100%;max-width:380px}
.card h2{text-align:center;color:#ff69b4;margin-bottom:12px;font-size:1.05em}
.card p{font-size:0.9em;color:#ccc;line-height:1.8;margin-bottom:14px}
.nin{width:100%;padding:13px;border:2px solid #ff69b4;border-radius:8px;
  background:rgba(255,255,255,0.07);color:#fff;font-size:1.1em;text-align:center;margin-bottom:11px}
.nin::placeholder{color:#666}
.bbtn{width:100%;padding:16px;background:linear-gradient(135deg,#ff69b4,#daa520);
  border:none;border-radius:10px;color:#fff;font-size:1.1em;font-weight:bold;cursor:pointer;
  touch-action:manipulation}
.eicon{font-size:3.5em;margin-bottom:10px;text-align:center}
.etitle{font-size:1.6em;font-weight:bold;margin-bottom:8px;text-align:center}
.estats{background:rgba(255,255,255,0.07);border-radius:9px;padding:12px;margin:10px 0;font-size:0.9em}
.estats div{padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.08)}

/* KO Banner */
#koban{display:none;position:absolute;inset:0;z-index:80;
  flex-direction:column;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.88);text-align:center;gap:10px;pointer-events:none}
#ko-icon{font-size:4.5em;animation:kopop .4s cubic-bezier(.17,.67,.5,1.4)}
#ko-txt{font-size:2.8em;font-weight:bold;color:#ffd700;
  text-shadow:0 0 24px #ffd700,0 0 8px #ff8800;
  animation:kopop .4s .1s cubic-bezier(.17,.67,.5,1.4) both}
#ko-pay{font-size:1.5em;color:#fff;font-weight:bold;margin-top:4px;
  animation:kopop .4s .25s cubic-bezier(.17,.67,.5,1.4) both}
@keyframes kopop{from{transform:scale(0.3);opacity:0}to{transform:scale(1);opacity:1}}
</style>
</head>

const t=k=>typeof L[LANG][k]==='function'?L[LANG][k]:L[LANG][k]||k;
const tf=(k,...a)=>L[LANG][k](...a);

// ===== CONSTANTS =====
const TS=32,MW=44,MH=36,GOAL=1000000,ALIM=30;
const LEX=[0,30,70,130,210,320,460,640,870,1150,9999];
const TC=['#555560','#6a6a88','#3a8a2a','#2a6acc','#22203a'];
const TT={RD:0,SW:1,GR:2,WA:3,BL:4};

// ===== GAME DATA =====

  {icon:'🏢',jp:'サラリーマンおじ',en:'Salaryman',moodMax:80,wMin:50000,wMax:80000},
  {icon:'💰',jp:'社長おじ',en:'CEO Uncle',moodMax:100,wMin:100000,wMax:200000},
  {icon:'🎸',jp:'バンドおじ',en:'Band Uncle',moodMax:70,wMin:30000,wMax:60000},

      mi:["Not bad!","Oh, that worked!","I felt that…"],
      hi:["I'm done!","A-amazing!","Ok, I'll pay!"]}

// ===== MAP =====
let map=[];
function buildMap(){
  map=Array.from({length:MH},()=>Array(MW).fill(TT.SW));
  [[5,6],[12,13],[20,21],[27,28],[33,34]].forEach(([a,b])=>{
    for(let x=0;x<MW;x++){map[a][x]=TT.RD;map[b][x]=TT.RD;}
  });
  [[7,8],[16,17],[24,25],[31,32],[38,39]].forEach(([a,b])=>{
    for(let y=0;y<MH;y++){map[y][a]=TT.RD;map[y][b]=TT.RD;}
  });
  fr(TT.GR,9,14,9,8);
  fr(TT.WA,35,28,MW-35,MH-28);
  fr(TT.WA,0,32,MW,MH-32);
  BLDGS.forEach(b=>fr(TT.BL,b.tx,b.ty,b.tw,b.th));
}
function fr(t,x,y,w,h){
  for(let dy=0;dy<h;dy++)for(let dx=0;dx<w;dx++){
    const nx=x+dx,ny=y+dy;
    if(ny>=0&&ny<MH&&nx>=0&&nx<MW)map[ny][nx]=t;
  }
}
const ROADS=[];
function buildRoads(){
  ROADS.length=0;
  for(let y=0;y<MH;y++)for(let x=0;x<MW;x++)
    if(map[y][x]===TT.RD)ROADS.push({x,y});
}

// ===== UTILS =====
function ri(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function cl(v,a,b){return Math.min(b,Math.max(a,v));}
function fage(m){const y=Math.floor(m/12),mo=m%12;return mo?`${y}歳${mo}ヶ月`:`${y}歳`;}
function fmoney(n){return n.toLocaleString('ja-JP')+'円';}

function lvup(){

}
function invChance(){
  return cl(Math.floor((ALIM-G.ageM/12)*6+G.lv*10+G.charm/4),5,85);
}

// ===== COLLISION =====
function canWalk(px,py){
  const m=10;
  for(const[cx,cy]of[[px-m,py-m],[px+m,py-m],[px-m,py+m],[px+m,py+m]]){
    const tx=Math.floor(cx/TS),ty=Math.floor(cy/TS);
    if(tx<0||ty<0||tx>=MW||ty>=MH)return false;
    if(map[ty][tx]===TT.BL||map[ty][tx]===TT.WA)return false;
  }
  return true;
}

// ===== PLAYER UPDATE =====
function updatePlayer(){
  if(inBattle)return;
  const spd=2.5;
  let dx=0,dy=0;
  if(keys['ArrowUp']||keys['w']||dpad.u)dy=-1;
  if(keys['ArrowDown']||keys['s']||dpad.d)dy=1;
  if(keys['ArrowLeft']||keys['a']||dpad.l)dx=-1;
  if(keys['ArrowRight']||keys['d']||dpad.r)dx=1;
  if(dx&&dy){dx*=.707;dy*=.707;}
  if(dx||dy){
    pl.at++;if(pl.at%8===0)pl.af=(pl.af+1)%4;
    pl.steps++;
    if(pl.steps>=120){pl.steps=0;G.ageM++;setMsg(t('walk'));updateHUD();checkEnd();}
  }
  const nx=pl.px+dx*spd,ny=pl.py+dy*spd;
  if(canWalk(nx,pl.py))pl.px=nx;
  if(canWalk(pl.px,ny))pl.py=ny;
  pl.px=cl(pl.px,TS,MW*TS-TS);
  pl.py=cl(pl.py,TS,MH*TS-TS);
}

// ===== NPC UPDATE =====
function updateNPCs(){
  if(inBattle)return;
  npcs.forEach(n=>{
    if(n.rare){
      // 黄金おじ：プレイヤーに近づかれたら逃げる
      n.flash=(n.flash||0)+1;
      const ddx=n.px-pl.px,ddy=n.py-pl.py;
      const dist=Math.hypot(ddx,ddy);
      if(dist<200)n.dir=Math.atan2(ddy,ddx); // 逃げる方向
      else{n.ct--;if(n.ct<=0){n.ct=ri(20,50);n.dir=Math.random()*Math.PI*2;}}
      const nx=n.px+Math.cos(n.dir)*n.spd,ny=n.py+Math.sin(n.dir)*n.spd;
      if(canWalk(nx,n.py))n.px=nx;else n.dir=Math.random()*Math.PI*2;
      if(canWalk(n.px,ny))n.py=ny;else n.dir=Math.random()*Math.PI*2;
      n.px=cl(n.px,TS,MW*TS-TS);n.py=cl(n.py,TS,MH*TS-TS);
    } else {
      n.ct--;
      if(n.ct<=0){n.idle=!n.idle;n.ct=n.idle?ri(30,80):ri(60,180);if(!n.idle)n.dir=Math.random()*Math.PI*2;}
      if(!n.idle){
        const nx=n.px+Math.cos(n.dir)*n.spd,ny=n.py+Math.sin(n.dir)*n.spd;
        if(canWalk(nx,n.py))n.px=nx;else n.dir+=Math.PI+ri(-20,20)*.05;
        if(canWalk(n.px,ny))n.py=ny;else n.dir+=Math.PI+ri(-20,20)*.05;
        n.px=cl(n.px,TS,MW*TS-TS);n.py=cl(n.py,TS,MH*TS-TS);
      }
    }
  });
}

// ===== PROXIMITY =====
function checkProx(){
  nearNPC=null;nearBldg=null;
  let md=Infinity;
  npcs.forEach(n=>{
    const d=Math.hypot(n.px-pl.px,n.py-pl.py);
    const range=n.rare?38:54;
    if(d<range&&d<md){md=d;nearNPC=n;}
  });
  if(!nearNPC){
    BLDGS.forEach(b=>{
      const bx=b.tx*TS+b.tw*TS/2,by=b.ty*TS+b.th*TS/2;
      if(Math.hypot(bx-pl.px,by-pl.py)<b.tw*TS/2+28)nearBldg=b;
    });
  }
  const ab=document.getElementById('abtn');
  if(nearNPC){ab.textContent=t('talk');ab.style.display='block';}
  else if(nearBldg){ab.textContent=t('enter');ab.style.display='block';}
  else ab.style.display='none';
}

function interact(){
  if(inBattle)return;
  if(nearNPC)startBattle(nearNPC);
  else if(nearBldg)doEnter(nearBldg);
}
function doEnter(b){
  G.ac++;
  switch(b.type){
    case'salon':
      if(G.money<5000){setMsg(t('poor5'));return;}
      G.money-=5000;G.charm=cl(G.charm+15,0,100);G.ageM++;G.hp=cl(G.hp-5,0,G.mhp);
      setMsg(LANG==='jp'?'美容院！魅力+15（-5,000円）':'Beauty salon! Charm+15 (-¥5k)');break;
    case'bar':
      G.exp+=25;G.charm=cl(G.charm+5,0,100);G.ageM+=2;G.hp=cl(G.hp-20,0,G.mhp);G.mp=cl(G.mp-10,0,G.mmp);
      setMsg(LANG==='jp'?'バーで合コン！EXP+25（HP-20 -2ヶ月）':'Bar mixer! EXP+25 (HP-20 -2mo)');break;
    case'cafe':
      G.hp=cl(G.hp+40,0,G.mhp);G.mp=cl(G.mp+30,0,G.mmp);G.ageM++;
      setMsg(LANG==='jp'?'カフェで休憩！HP+40 MP+30':'Cafe break! HP+40 MP+30');break;
    case'shop':
      G.money+=20000;G.exp+=10;G.ageM++;G.hp=cl(G.hp-15,0,G.mhp);
      setMsg(LANG==='jp'?'バイト！+20,000円 EXP+10':'Part-time! +¥20k EXP+10');break;
    case'invest':
      if(G.money<15000){setMsg(t('poor15'));return;}
      G.money-=15000;G.charm=cl(G.charm+25,0,100);G.exp+=15;G.ageM+=2;
      setMsg(LANG==='jp'?'自己投資！魅力+25（-15,000円）':'Self-invest! Charm+25 (-¥15k)');break;
    case'food':
      G.hp=cl(G.hp+25,0,G.mhp);G.mp=cl(G.mp+15,0,G.mmp);G.ageM++;
      setMsg(LANG==='jp'?'麻布十番で食事！HP+25 MP+15':'Azabu dinner! HP+25 MP+15');break;
    case'clinic':
      if(G.money<100000){setMsg(t('surgery_ng'));return;}
      G.money-=100000;G.charm=cl(G.charm+45,0,100);G.ageM+=3;G.hp=cl(G.hp-10,1,G.mhp);
      setMsg(t('surgery_ok'));break;
    case'park':
      G.hp=cl(G.hp+50,0,G.mhp);G.mp=cl(G.mp+40,0,G.mmp);G.ageM++;
      setMsg(LANG==='jp'?'公園でのんびり！HP+50 MP+40':'Park rest! HP+50 MP+40');break;
    case'hills':case'tower':case'odaiba':
      G.charm=cl(G.charm+(b.type==='tower'?10:b.type==='odaiba'?8:5),0,100);
      G.exp+=b.type==='hills'?5:10;G.ageM++;
      setMsg(LANG==='jp'?(b.type==='tower'?'東京タワー！魅力+10':b.type==='odaiba'?'お台場！魅力+8':'六本木ヒルズ！魅力+5'):(b.type==='tower'?'Tokyo Tower! Charm+10':b.type==='odaiba'?'Odaiba! Charm+8':'Roppongi Hills! Charm+5'));break;
  }
  lvup();updateHUD();
  if(checkEnd())return;
  if(Math.random()*100<invChance()&&!inBattle){
    setTimeout(()=>{setMsg(t('invite'));setTimeout(()=>startBattle(npcs[ri(0,npcs.length-1)]),700);},1000);
  }
}

// ===== BATTLE =====
function startBattle(npc){
  const oji=OJIS[npc?npc.oi:ri(0,OJIS.length-2)];
  const wallet=ri(oji.wMin,oji.wMax);
  const isRare=oji.rare||false;
  const maxR=isRare?1:3;
  bat={oji,wallet,hp:oji.moodMax,maxHp:oji.moodMax,round:1,maxR,done:false,isRare};
  if(npc&&npc.rare){
    const idx=npcs.indexOf(npc);if(idx>=0)npcs.splice(idx,1);
    setTimeout(()=>{
      if(!running)return;
      const sp=ROADS[ri(0,ROADS.length-1)];
      npcs.push({px:sp.x*TS+16,py:sp.y*TS+16,oi:OJIS.length-1,ci:0,
        dir:Math.random()*Math.PI*2,spd:3.2,ct:20,idle:false,rare:true,flash:0});
      setMsg(t('rare_app'));
    },20000);
  }
  inBattle=true;
  document.getElementById('blog').innerHTML='';
  document.getElementById('bic').textContent=oji.icon;
  document.getElementById('bnm').textContent=LANG==='jp'?oji.jp:oji.en;
  document.getElementById('bsb').textContent='💰 '+fmoney(wallet);
  const bov=document.getElementById('bov');
  bov.style.display='flex';
  bov.style.background=isRare?'rgba(20,12,0,0.98)':'rgba(0,0,12,0.97)';
  if(isRare){
    blog(t('rare_catch'),'g');
    blog(LANG==='jp'?'✨HPを削れば全額ゲット！':'✨Drain HP for full payout!','g');
  } else {
    blog(tf('bs',LANG==='jp'?oji.jp:oji.en),'g');
    blog(t('bh'),'');
  }
  renderBat();
}
function blog(msg,cls){
  const d=document.createElement('div');d.className='bl '+(cls||'');d.textContent=msg;
  const el=document.getElementById('blog');el.appendChild(d);el.scrollTop=el.scrollHeight;
}
function useSkill(id){
  if(!bat||bat.done)return;
  const sk=SKILLS.find(s=>s.id===id);
  // 枕営業：即勝利
  if(id==='makura'){
    blog(t('makura_use'),'b');
    G.hp=cl(G.hp-40,1,G.mhp);G.mp=0;G.charm=cl(G.charm-25,0,100);G.ageM+=2;G.exp+=50;
    bat.hp=0;bat.wallet=Math.floor(bat.wallet*3);
    setTimeout(()=>blog(t('makura_res'),'g'),500);
    setTimeout(()=>endBat(),1000);
    renderBat();return;
  }
  if(!sk||G.mp<sk.mp){blog(t('nomp'),'b');return;}
  G.mp-=sk.mp;
  let dmg=sk.gain;
  if(id==='hype')dmg+=ri(-8,12);
  if(id==='cute'){G.hp=cl(G.hp-5,0,G.mhp);}
  if(id==='real'&&Math.random()<.3){
    bat.hp=cl(bat.hp+20,0,bat.maxHp);
    blog(t('toreal'),'b');
    blog(`${bat.oji.icon}「${(OSAY[LANG]||OSAY.jp).lo[ri(0,3)]}」`,'o');
    bat.round++;if(bat.round>bat.maxR){endBat();return;}
    renderBat();return;
  }
  if(id==='smile')G.charm=cl(G.charm+3,0,100);
  bat.hp=cl(bat.hp-dmg,0,bat.maxHp);
  const nm=LANG==='jp'?sk.jp:sk.en;
  blog(`${sk.icon} ${nm}！ 💢-${dmg}`,'g');
  // 撃破！① バーを0に ② 450ms後KOバナー ③ 2500ms後に報酬
  if(bat.hp<=0){
    bat.hp=0;
    renderBat();
    setTimeout(()=>{
      document.getElementById('ko-txt').textContent=LANG==='jp'?'KO！！勝った！':'KO!! YOU WIN!';
      document.getElementById('ko-pay').textContent='💰 '+fmoney(bat.wallet);
      const kb=document.getElementById('koban');
      kb.style.display='flex';
      // アニメーションリセット
      kb.querySelectorAll('#ko-icon,#ko-txt,#ko-pay').forEach(el=>{
        el.style.animation='none';el.offsetHeight;el.style.animation='';
      });
    },450);
    setTimeout(()=>{
      document.getElementById('koban').style.display='none';
      endBat();
    },2600);
    return;
  }
  const damagePct=1-(bat.hp/bat.maxHp);
  const say=OSAY[LANG]||OSAY.jp;
  const pool=damagePct<.4?say.lo:damagePct<.7?say.mi:say.hi;
  blog(`${bat.oji.icon}「${pool[ri(0,pool.length-1)]}」`,'o');
  bat.round++;
  if(bat.round>bat.maxR){endBat();return;}
  renderBat();
}
function endBat(){
  const{oji,wallet,hp,maxHp}=bat;
  const pct=cl(1-hp/maxHp,0,1);
  let pay=hp<=0?wallet:Math.floor(wallet*pct);
  let bon='';
  if(pct>=.8&&hp>0){pay=Math.floor(pay*1.2);bon=t('bonus');}
  G.money+=pay;G.exp+=20+Math.floor(pct*30);G.bw++;
  bat.done=true;inBattle=false;G.ageM++;
  blog('──────────','');
  blog(tf('be',hp<=0?100:Math.floor(pct*100)),'');
  if(bon)blog(bon,'g');
  blog(tf('got',fmoney(pay)),'g');
  lvup();updateHUD();
  setTimeout(()=>{
    bat=null;
    document.getElementById('bov').style.display='none';
    const nm=LANG==='jp'?oji.jp:oji.en;
    setMsg(tf('got2',nm,fmoney(pay))+(bon?' '+bon:''));
    if(checkEnd())return;
  },2200);
}
function renderBat(){
  if(!bat)return;
  const{oji,hp,maxHp,round,maxR,wallet,isRare}=bat;
  const hpPct=hp/maxHp;
  const damagePct=1-hpPct;
  const mbf=document.getElementById('mbf');
  mbf.style.width=(hpPct*100)+'%';
  mbf.style.background=isRare?'linear-gradient(90deg,#ffd700,#ff8800)':
    hpPct>.5?'linear-gradient(90deg,#ff4444,#ff8800)':'linear-gradient(90deg,#ff2222,#ff4400)';
  document.getElementById('mbv').textContent=`${hp} / ${maxHp}`;
  document.getElementById('mpf').style.width=`${G.mp/G.mmp*100}%`;
  document.getElementById('mpv').textContent=`${G.mp} / ${G.mmp}`;
  const estPay=hp<=0?wallet:Math.floor(wallet*damagePct);
  document.getElementById('bpay').textContent=`💰 ${LANG==='jp'?'ゲット予想':'Est.'}: ${fmoney(estPay)}`;
  const rem=maxR-round+1;
  document.getElementById('brnd').textContent=isRare
    ?(LANG==='jp'?'⭐ ラスト1ターン！':'⭐ Last Turn!')
    :(LANG==='jp'?`残り ${rem} ターン`:`${rem} turn(s) left`);
  const sg=document.getElementById('sgrid');sg.innerHTML='';
  SKILLS.forEach(sk=>{
    const locked=G.lv<sk.lv;
    const ok=!locked&&(sk.id==='makura'||G.mp>=sk.mp);
    const b=document.createElement('button');b.className='sk';b.disabled=!ok;
    const nm=LANG==='jp'?sk.jp:sk.en;
    const dmgLabel=sk.id==='makura'?(LANG==='jp'?'即KO×3💰':'Instant×3💰'):`💢${sk.gain}`;
    const mpLabel=sk.id==='makura'?'MP:ALL':`MP:${sk.mp}`;
    b.innerHTML=`<div class="sn">${sk.icon} ${nm}</div><div class="sm">${mpLabel}　${locked?`🔒Lv${sk.lv}`:dmgLabel}</div>`;
    if(ok)b.onclick=()=>useSkill(sk.id);
    sg.appendChild(b);
  });
}

// ===== RENDER =====
const cv=document.getElementById('gc');
const cx=cv.getContext('2d');
function resizeCv(){
  cv.width=cv.offsetWidth;cv.height=cv.offsetHeight;
}
window.addEventListener('resize',resizeCv);

function render(){
  const W=cv.width,H=cv.height;
  cx.fillStyle='#22203a';cx.fillRect(0,0,W,H);
  cam.x=cl(pl.px-W/2,0,MW*TS-W);
  cam.y=cl(pl.py-H/2,0,MH*TS-H);
  const tx0=Math.floor(cam.x/TS),ty0=Math.floor(cam.y/TS);
  const tx1=Math.min(MW,tx0+Math.ceil(W/TS)+2);
  const ty1=Math.min(MH,ty0+Math.ceil(H/TS)+2);
  // Tiles
  for(let ty=ty0;ty<ty1;ty++){
    for(let tx=tx0;tx<tx1;tx++){
      const tt=map[ty][tx];
      cx.fillStyle=TC[tt];
      const sx=tx*TS-cam.x,sy=ty*TS-cam.y;
      cx.fillRect(sx,sy,TS,TS);
      if(tt===TT.RD){cx.fillStyle='rgba(255,255,80,.18)';cx.fillRect(sx+TS/2-1,sy,2,TS);}
      if(tt===TT.GR&&(tx+ty)%2===0){cx.fillStyle='rgba(80,255,80,.1)';cx.fillRect(sx+2,sy+2,6,6);}
      if(tt===TT.WA){cx.fillStyle='rgba(100,200,255,.22)';cx.fillRect(sx,sy+(Math.floor(Date.now()/300+tx*3))%TS,TS,4);}
    }
  }
  // Buildings
  BLDGS.forEach(b=>{
    const bx=b.tx*TS-cam.x,by=b.ty*TS-cam.y,bw=b.tw*TS,bh=b.th*TS;
    if(bx+bw<0||bx>W||by+bh<0||by>H)return;
    const g=cx.createLinearGradient(bx,by,bx,by+bh);
    g.addColorStop(0,b.col[0]);g.addColorStop(1,b.col[1]);
    cx.fillStyle=g;rr(bx+1,by+1,bw-2,bh-2,5);cx.fill();
    cx.strokeStyle='rgba(255,255,255,.25)';cx.lineWidth=1;rr(bx+1,by+1,bw-2,bh-2,5);cx.stroke();
    cx.fillStyle='rgba(255,255,180,.22)';
    for(let wy=by+5;wy<by+bh-8;wy+=10)for(let wx=bx+5;wx<bx+bw-6;wx+=10)cx.fillRect(wx,wy,5,5);
    cx.fillStyle='rgba(0,0,0,.65)';cx.fillRect(bx+2,by+bh-15,bw-4,13);
    cx.fillStyle='#fff';cx.font='bold 8px sans-serif';cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText(LANG==='jp'?b.jp:b.en,bx+bw/2,by+bh-9);
    // Highlight near building
    if(nearBldg===b){
      cx.strokeStyle='rgba(255,215,0,.8)';cx.lineWidth=2;rr(bx,by,bw,bh,5);cx.stroke();
    }
  });
  // NPCs
  npcs.forEach(n=>{
    const sx=n.px-cam.x,sy=n.py-cam.y;
    if(sx<-40||sx>W+40||sy<-40||sy>H+40)return;
    if(n.rare){
      // キンピカ黄金おじ
      const t2=Date.now()/400;
      const glowR=18+Math.sin(t2)*5;
      const grd=cx.createRadialGradient(sx,sy-8,2,sx,sy-8,glowR);
      grd.addColorStop(0,'rgba(255,220,0,0.9)');
      grd.addColorStop(0.5,'rgba(255,180,0,0.5)');
      grd.addColorStop(1,'rgba(255,140,0,0)');
      cx.fillStyle=grd;cx.beginPath();cx.arc(sx,sy-8,glowR,0,Math.PI*2);cx.fill();
      // 星パーティクル
      for(let i=0;i<4;i++){
        const a=t2+i*Math.PI/2,r=14+Math.sin(t2*2+i)*4;
        cx.fillStyle=`rgba(255,255,100,${0.6+Math.sin(t2+i)*0.4})`;
        cx.font='8px sans-serif';cx.textAlign='center';cx.textBaseline='middle';
        cx.fillText('✦',sx+Math.cos(a)*r,sy-8+Math.sin(a)*r);
      }
      cx.fillStyle='rgba(0,0,0,.3)';cx.beginPath();cx.ellipse(sx,sy+10,9,4,0,0,Math.PI*2);cx.fill();
      const bg=cx.createLinearGradient(sx-8,sy-20,sx+8,sy+12);
      bg.addColorStop(0,'#ffe066');bg.addColorStop(1,'#cc8800');
      cx.fillStyle=bg;rr(sx-8,sy-4,16,18,4);cx.fill();
      cx.strokeStyle='#fff8a0';cx.lineWidth=1.5;rr(sx-8,sy-4,16,18,4);cx.stroke();
      cx.fillStyle='#ffe4a0';cx.beginPath();cx.arc(sx,sy-13,10,0,Math.PI*2);cx.fill();
      cx.strokeStyle='#ffd700';cx.lineWidth=1.5;cx.beginPath();cx.arc(sx,sy-13,10,0,Math.PI*2);cx.stroke();
      cx.fillStyle='#cc8800';cx.beginPath();cx.arc(sx,sy-20,7,Math.PI,0);cx.fill();
      cx.fillStyle='#333';cx.fillRect(sx-4,sy-15,3,3);cx.fillRect(sx+1,sy-15,3,3);
      cx.font='10px sans-serif';cx.textAlign='center';cx.textBaseline='middle';
      cx.fillText('⭐',sx,sy+5);
      if(nearNPC===n){
        cx.fillStyle='rgba(255,230,0,.95)';cx.beginPath();
        cx.roundRect?cx.roundRect(sx-26,sy-40,52,16,4):cx.rect(sx-26,sy-40,52,16);cx.fill();
        cx.fillStyle='#5a3000';cx.font='bold 9px sans-serif';cx.textAlign='center';cx.textBaseline='middle';
        cx.fillText(LANG==='jp'?'⭐つかまえる！':'⭐ Catch!',sx,sy-32);
      }
    } else {
      cx.fillStyle='rgba(0,0,0,.3)';cx.beginPath();cx.ellipse(sx,sy+10,8,4,0,0,Math.PI*2);cx.fill();
      cx.fillStyle=NPC_C[n.ci];rr(sx-7,sy-4,14,16,4);cx.fill();
      cx.fillStyle='#f5c89a';cx.beginPath();cx.arc(sx,sy-11,9,0,Math.PI*2);cx.fill();
      cx.fillStyle=NPC_C[n.ci];cx.beginPath();cx.arc(sx,sy-17,6,Math.PI,0);cx.fill();
      cx.fillStyle='#222';cx.fillRect(sx-4,sy-13,3,3);cx.fillRect(sx+1,sy-13,3,3);
      cx.font='9px sans-serif';cx.textAlign='center';cx.textBaseline='middle';
      cx.fillText(OJIS[n.oi].icon,sx,sy+5);
      if(nearNPC===n){
        cx.fillStyle='rgba(255,255,255,.92)';cx.beginPath();
        cx.roundRect?cx.roundRect(sx-20,sy-38,40,15,4):cx.rect(sx-20,sy-38,40,15);cx.fill();
        cx.fillStyle='#333';cx.font='bold 8px sans-serif';cx.textAlign='center';cx.textBaseline='middle';
        cx.fillText(LANG==='jp'?'💬話せる':'💬Talk',sx,sy-30);
      }
    }
  });
  // Player
  const bob=Math.sin(pl.af*1.5)*2;
  cx.fillStyle='rgba(0,0,0,.35)';cx.beginPath();cx.ellipse(pl.px-cam.x,pl.py-cam.y+12,9,4,0,0,Math.PI*2);cx.fill();
  const dg=cx.createLinearGradient(0,pl.py-cam.y-4,0,pl.py-cam.y+14);
  dg.addColorStop(0,'#ff69b4');dg.addColorStop(1,'#cc44aa');
  cx.fillStyle=dg;rr(pl.px-cam.x-8,pl.py-cam.y-4+bob,16,18,5);cx.fill();
  cx.fillStyle='#f5c89a';cx.beginPath();cx.arc(pl.px-cam.x,pl.py-cam.y-12+bob,10,0,Math.PI*2);cx.fill();
  const hg=cx.createLinearGradient(0,pl.py-cam.y-22,0,pl.py-cam.y-10);
  hg.addColorStop(0,'#2a1a00');hg.addColorStop(1,'#5a3a10');
  cx.fillStyle=hg;cx.beginPath();cx.arc(pl.px-cam.x,pl.py-cam.y-17+bob,7,Math.PI,0);cx.fill();
  cx.fillRect(pl.px-cam.x-10,pl.py-cam.y-18+bob,5,10);cx.fillRect(pl.px-cam.x+5,pl.py-cam.y-18+bob,5,10);
  cx.fillStyle='#222';cx.fillRect(pl.px-cam.x-4,pl.py-cam.y-14+bob,3,3);cx.fillRect(pl.px-cam.x+1,pl.py-cam.y-14+bob,3,3);
  cx.strokeStyle='#cc6688';cx.lineWidth=1.5;cx.beginPath();cx.arc(pl.px-cam.x,pl.py-cam.y-10+bob,3,.1,Math.PI-.1);cx.stroke();
  // Name tag
  cx.fillStyle='rgba(255,105,180,.85)';rr(pl.px-cam.x-20,pl.py-cam.y-30+bob,40,13,4);cx.fill();
  cx.fillStyle='#fff';cx.font='bold 8px sans-serif';cx.textAlign='center';cx.textBaseline='middle';
  cx.fillText(G.name||'?',pl.px-cam.x,pl.py-cam.y-23+bob);
  // Minimap
  const mw=58,mh=46,mx=W-mw-5,my=5;
  cx.fillStyle='rgba(0,0,0,.65)';cx.fillRect(mx,my,mw,mh);
  cx.strokeStyle='rgba(255,105,180,.55)';cx.lineWidth=1;cx.strokeRect(mx,my,mw,mh);
  const sx2=mw/MW,sy2=mh/MH;
  for(let y=0;y<MH;y+=2)for(let x=0;x<MW;x+=2){
    const tt=map[y][x];
    cx.fillStyle=tt===TT.RD?'#666':tt===TT.GR?'#2a7':tt===TT.WA?'#28c':tt===TT.BL?'#333':'#505';
    cx.fillRect(mx+x*sx2,my+y*sy2,sx2*2,sy2*2);
  }
  npcs.forEach(n=>{cx.fillStyle='#fa0';cx.fillRect(mx+n.px/TS*sx2-1,my+n.py/TS*sy2-1,2,2);});
  cx.fillStyle='#ff69b4';cx.fillRect(mx+pl.px/TS*sx2-2,my+pl.py/TS*sy2-2,4,4);
}
function rr(x,y,w,h,r){
  cx.beginPath();cx.moveTo(x+r,y);cx.lineTo(x+w-r,y);cx.quadraticCurveTo(x+w,y,x+w,y+r);
  cx.lineTo(x+w,y+h-r);cx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  cx.lineTo(x+r,y+h);cx.quadraticCurveTo(x,y+h,x,y+h-r);
  cx.lineTo(x,y+r);cx.quadraticCurveTo(x,y,x+r,y);cx.closePath();
}

// ===== GAME LOOP =====
let lastT=0;
function loop(ts){
  if(!running)return;
  requestAnimationFrame(loop);
  if(ts-lastT<16)return;lastT=ts;
  updatePlayer();updateNPCs();checkProx();render();updateHUD();
}

// ===== START / RESET =====
function startGame(){
  const name=document.getElementById('pname').value.trim()||'みなと';
  G=initG(name);
  buildMap();buildRoads();spawnNPCs();
  pl={px:7*TS+16,py:13*TS+16,af:0,at:0,steps:0};
  inBattle=false;bat=null;
  document.getElementById('ss').style.display='none';
  resizeCv();
  running=true;
  if(ageTimer)clearInterval(ageTimer);
  ageTimer=setInterval(()=>{
    if(!running||inBattle)return;
    G.ageM++;setMsg(tf('tp',1));updateHUD();
    if(checkEnd())clearInterval(ageTimer);
  },4000);
  setMsg(t('welcome'));
  requestAnimationFrame(loop);
}
function resetGame(){
  running=false;if(ageTimer)clearInterval(ageTimer);
  inBattle=false;bat=null;G={};
  document.getElementById('ws').style.display='none';
  document.getElementById('ls').style.display='none';
  document.getElementById('bov').style.display='none';
  document.getElementById('pname').value='';
  document.getElementById('ss').style.display='flex';
}

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}
</script>
